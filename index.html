<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Free AI Paraphraser</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
    body{max-width:800px;margin:40px auto;padding:0 20px;background:#f9f9f9}
    .box{background:white;padding:24px;border-radius:12px;box-shadow:0 2px 10px #00000010}
    textarea{width:100%;height:180px;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
    button{background:#007bff;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer}
    .result{margin-top:20px;padding:16px;background:#f1f1f1;border-radius:8px;min-height:100px;white-space:pre-wrap}
    .tg{margin-top:20px;text-align:center;color:#333}
    .tg a{color:#007bff;font-weight:bold}
    .limit{color:#666;font-size:14px;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="box">
    <h2>Free AI Paraphraser | Rewrite Text</h2>
    <p class="limit">Free daily uses, no login needed</p>
    <textarea id="input" placeholder="Paste your text here..."></textarea>
    <button onclick="rewrite()">Paraphrase</button>
    <div class="result" id="result"></div>
  </div>
  <div class="tg">
    Unlimited use & API Key → Telegram: <a href=" " target="_blank">@FinishNAN</a >
  </div>
  <script>
    let count = 0;
    async function rewrite() {
      if(count >= 3) {
        document.getElementById("result").innerText = "Daily limit reached. DM Telegram for unlimited.";
        return;
      }
      const inputDom = document.getElementById("input");
      const resultDom = document.getElementById("result");
      const text = inputDom.value.trim();
      if(!text) return alert("Enter text");
      
      resultDom.innerText = "";
      let fullText = "";

      try {
        const res = await fetch("/api/proxy", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            stream: true,
            messages: [
              { role: "user", content: `请改写下面这段文字：${text}` }
            ]
          })
        });

        if (!res.ok) {
          resultDom.innerText = `请求失败：${res.status}`;
          return;
        }

        // 流式分段读取SSE数据流（核心修复）
        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            let dataStr = line.slice(6).trim();
            if (dataStr === "[DONE]") continue;
            if (!dataStr) continue;

            try {
              const json = JSON.parse(dataStr);
              // 讯飞spark-x兼容openai格式，取delta增量文字
              const delta = json.choices?.[0]?.delta?.content || "";
              fullText += delta;
              resultDom.innerText = fullText;
            } catch (e) {
              // 解析错误直接跳过分片
              continue;
            }
          }
        }
        count++;
      } catch (err) {
        resultDom.innerText = "网络异常：" + err.message;
      }
    }
  </script>
</body>
</html>
